name: 🚚 Transporter App - CI/CD Pipelinee

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: '18'
  APP_NAME: transporter-app

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: BUILD
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'                          # ✅ Enhancement: npm cache for faster builds

      - name: 📦 Install Dependencies
        run: npm ci                             # Uses package-lock.json for reproducible installs

      - name: 🔍 Lint Check (Node Syntax)
        run: node --check app/index.js

      - name: 📁 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            app/
            package.json
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: TEST
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build                               # Runs AFTER build succeeds

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests with Coverage
        run: npm run test:ci

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 3

  # ─────────────────────────────────────────────
  # JOB 3: SECURITY SCAN
  # ─────────────────────────────────────────────
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 npm Audit (Security Check)
        run: npm audit --audit-level=high || true   # Won't fail pipeline, just reports

  # ─────────────────────────────────────────────
  # JOB 4: DOCKER BUILD & PUSH
  # ─────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'        # Only on main branch

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      - name: 🚀 Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}
          echo "✅ Image pushed: ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest"

  # ─────────────────────────────────────────────
  # JOB 5: DEPLOY (Render / Cloud)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🌐 Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail \
            && echo "✅ Deployment triggered on Render!" \
            || echo "⚠️ Deploy hook call failed — check RENDER_DEPLOY_HOOK_URL secret"

      - name: 📋 Post Deployment Summary
        run: |
          echo "======================================"
          echo "  🚚 TRANSPORTER APP DEPLOYED!"
          echo "======================================"
          echo "  Branch:   ${{ github.ref_name }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Actor:    ${{ github.actor }}"
          echo "  Time:     $(date -u)"
          echo "======================================"

  # ─────────────────────────────────────────────
  # JOB 6: NOTIFY (Status Summary)
  # ─────────────────────────────────────────────
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build, test, security, docker, deploy]
    if: always()                               # ✅ Enhancement: always runs even if prev job fails

    steps:
      - name: ✅ Success Notification
        if: ${{ needs.deploy.result == 'success' }}
        run: echo "🎉 Full pipeline PASSED! Transporter App is live."

      - name: ❌ Failure Notification
        if: ${{ needs.deploy.result != 'success' }}
        run: echo "🚨 Pipeline had issues. Check logs above."
