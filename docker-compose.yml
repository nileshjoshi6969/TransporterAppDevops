version: '3.8'

services:
  transporter-app:
    build:
      context: .
    container_name: transporter-app

    ports:
      - "3000:3000"

    environment:
      - PORT=3000
      - NODE_ENV=production

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
